name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "35.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

  helm:
    name: Helm chart validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/duihua-gateway

      - name: Render templates
        run: helm template duihua-gateway charts/duihua-gateway --debug > /tmp/helm-rendered.yaml

  dockerfile:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: duihua-gateway:ci

      - name: Export image tarball
        run: docker save duihua-gateway:ci -o duihua-gateway-ci.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: duihua-gateway-ci-image
          path: duihua-gateway-ci.tar
          retention-days: 1

  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "35.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build gateway
        run: cargo build --release

      - name: Start gateway
        run: |
          BIND_ADDR=127.0.0.1:18080 \
          RESPONSES_API_STORE_ENABLED=false \
          ./target/release/duihua-gateway &

      - name: Wait for gateway
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "gateway failed to become ready" >&2
          exit 1

      - name: Run smoke test
        run: curl -fsS http://127.0.0.1:18080/healthz

  helm-smoke:
    name: Helm chart smoke test (kind)
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 30
    env:
      CLUSTER_NAME: duihua-gateway-smoke
      KUBECTL_CONTEXT: kind-duihua-gateway-smoke
      MANAGE_KIND_CLUSTER: "false"
      SKIP_DOCKER_BUILD: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: duihua-gateway-ci-image

      - name: Load image
        run: docker load -i duihua-gateway-ci.tar

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Run Helm kind smoke test
        run: ./scripts/helm-smoke-kind.sh