services:
  duihua-gateway:
    build: .
    environment:
      BIND_ADDR: 0.0.0.0:8080
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-http://vllm:8000/v1}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-Qwen/Qwen3.5-0.8B}
      RESPONSES_API_STORE_ENABLED: ${RESPONSES_API_STORE_ENABLED:-false}
      RESPONSES_API_STORE_ENDPOINT: http://responses-api-store:50051
      RESPONSES_BACKGROUND_ENABLED: ${RESPONSES_BACKGROUND_ENABLED:-false}
      RESPONSE_ID_STORE_TTL_SECONDS: "86400"
      RUST_LOG: ${RUST_LOG:-info,duihua_gateway=debug}
    ports:
      - "8080:8080"
    depends_on:
      responses-api-store:
        condition: service_healthy
        required: false
      vllm:
        condition: service_started
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"

  responses-api-store:
    profiles: [store]
    image: ghcr.io/beranekio/responses-api-store:latest
    environment:
      GRPC_LISTEN_ADDR: 0.0.0.0:50051
      RESPONSE_ID_STORE_URL: redis://valkey:6379
      RESPONSE_ID_STORE_KEY_PREFIX: responses-api-store:responses
      RESPONSE_ID_STORE_TTL_SECONDS: "86400"
      BACKGROUND_QUEUE_STREAM_KEY: responses-api-store:background
      BACKGROUND_RESPONSE_STALE_SECONDS: "3600"
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "/responses-api-store-probe"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      valkey:
        condition: service_healthy

  valkey:
    profiles: [store]
    image: valkey/valkey:9.1.0-alpine
    command:
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  vllm:
    profiles: [inference]
    image: vllm/vllm-openai-cpu:latest
    command:
      - Qwen/Qwen3.5-0.8B
      - --served-model-name
      - Qwen/Qwen3.5-0.8B
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "262144"
      - --safetensors-load-strategy
      - "lazy"
      - --gpu-memory-utilization
      - "0.6"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - vllm-cache:/root/.cache/huggingface
    shm_size: "2g"

volumes:
  vllm-cache: